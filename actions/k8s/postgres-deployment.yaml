apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-postgres
  labels:
    app: bookstore-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookstore-postgres
  template:
    metadata:
      labels:
        app: bookstore-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: "book"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bookstore-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookstore-db-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: bookstore-postgres-pvc
