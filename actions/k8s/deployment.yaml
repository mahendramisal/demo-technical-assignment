apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-api
  labels:
    app: bookstore-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bookstore-api
  template:
    metadata:
      labels:
        app: bookstore-api
    spec:
      containers:
        - name: api
          image: bookstore-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_DB
              value: "book"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bookstore-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookstore-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              value: "bookstore-postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_SCHEMA
              value: "bookstore"
          readinessProbe:
            httpGet:
              path: /db_info/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /db_info/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
